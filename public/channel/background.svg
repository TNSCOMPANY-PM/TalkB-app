<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="780" viewBox="0 0 1080 780">

  <!-- Site white background -->
  <rect width="1080" height="780" fill="#FFFFFF"/>

  <!-- Very subtle warm tint strip at top -->
  <rect width="1080" height="4" fill="#E85D3A"/>

  <!-- Main headline line 1: dark ink, matches site h1 style -->
  <text
    x="88" y="280"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
    font-size="80"
    font-weight="800"
    fill="#0A0A0A"
    letter-spacing="-3"
  >요즘 손님들은</text>

  <!-- Line 2: "GPT에" dark, "물어봅니다." accent -->
  <text
    x="88" y="378"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
    font-size="80"
    font-weight="800"
    letter-spacing="-3"
  >
    <tspan fill="#0A0A0A">GPT에 </tspan><tspan fill="#E85D3A">물어봅니다.</tspan>
  </text>

  <!-- Sub headline: accent color, matches site accent heading -->
  <text
    x="88" y="476"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    fill="#E85D3A"
    letter-spacing="-2"
  >사장님 가게가 나올까요?</text>

  <!-- Thin divider matching site border color -->
  <rect x="88" y="514" width="904" height="1" fill="#E4E4E7"/>

  <!-- Bottom right logo — ink-muted tone -->
  <text
    x="992" y="700"
    text-anchor="end"
    font-family="'Pretendard', 'Apple SD Gothic Neo', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    fill="#0A0A0A"
    letter-spacing="-1"
  >TalkB</text>

  <text
    x="992" y="732"
    text-anchor="end"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#757575"
    letter-spacing="3"
  >토크비</text>

</svg>
