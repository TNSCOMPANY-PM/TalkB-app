<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="780" viewBox="0 0 1080 780">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2D1A0E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1080" height="780" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <line x1="0" y1="390" x2="1080" y2="390" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="780" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Accent bar left edge -->
  <rect x="0" y="0" width="6" height="780" fill="url(#accentGrad)"/>

  <!-- Top label -->
  <rect x="72" y="72" width="220" height="38" rx="19" fill="rgba(249,115,22,0.18)" stroke="rgba(249,115,22,0.35)" stroke-width="1.5"/>
  <text
    x="182"
    y="97"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="17"
    font-weight="700"
    fill="#F97316"
    letter-spacing="1"
  >NO.1 외식업 AI 노출 솔루션</text>

  <!-- Main headline line 1 -->
  <text
    x="72"
    y="240"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
    font-size="72"
    font-weight="900"
    fill="white"
    letter-spacing="-2"
  >요즘 손님들은</text>

  <!-- Accent word -->
  <text
    x="72"
    y="330"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
  >
    <tspan fill="white">GPT에 </tspan><tspan fill="#F97316">물어봅니다</tspan>
  </text>

  <!-- Main headline line 2 -->
  <text
    x="72"
    y="440"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
    font-size="58"
    font-weight="800"
    fill="rgba(255,255,255,0.85)"
    letter-spacing="-1.5"
  >사장님 가게가 나올까요?</text>

  <!-- Divider line -->
  <rect x="72" y="488" width="120" height="4" rx="2" fill="#F97316"/>

  <!-- Sub copy -->
  <text
    x="72"
    y="556"
    font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
    font-size="30"
    font-weight="500"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="0"
  >30초 무료 진단 · 카카오로 1초 시작</text>

  <!-- Bottom right logo -->
  <g transform="translate(856, 660)">
    <!-- Orange dot accent -->
    <circle cx="0" cy="-4" r="5" fill="#F97316"/>
    <text
      x="14"
      y="0"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="38"
      font-weight="900"
      fill="white"
      letter-spacing="-1"
    >TalkB</text>
    <text
      x="14"
      y="32"
      font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif"
      font-size="20"
      font-weight="600"
      fill="rgba(255,255,255,0.5)"
      letter-spacing="4"
    >토크비</text>
  </g>
</svg>
