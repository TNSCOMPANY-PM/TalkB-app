<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">

  <!-- Flat accent background — exact site color #E85D3A -->
  <rect width="640" height="640" fill="#E85D3A"/>

  <!-- Simple chat bubble (site identity) centered, white -->
  <g transform="translate(320, 218)">
    <rect x="-68" y="-44" width="136" height="82" rx="22" fill="white" opacity="0.95"/>
    <!-- tail -->
    <path d="M -16 38 L -40 60 L 10 38 Z" fill="white" opacity="0.95"/>
    <!-- three dots -->
    <circle cx="-24" cy="-3" r="9" fill="#E85D3A"/>
    <circle cx="0"   cy="-3" r="9" fill="#E85D3A"/>
    <circle cx="24"  cy="-3" r="9" fill="#E85D3A"/>
  </g>

  <!-- TalkB — Pretendard fallback chain -->
  <text
    x="320" y="390"
    text-anchor="middle"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Helvetica Neue', Arial, sans-serif"
    font-size="116"
    font-weight="900"
    letter-spacing="-5"
    fill="white"
  >TalkB</text>

  <!-- 토크비 — subtle, gives context -->
  <text
    x="320" y="448"
    text-anchor="middle"
    font-family="'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="32"
    font-weight="600"
    letter-spacing="10"
    fill="rgba(255,255,255,0.65)"
  >토크비</text>

</svg>
